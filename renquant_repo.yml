schema_version: 1
name: renquant-model-patchtst
role: PatchTST/PatchTXT sequence-model training and shadow pipeline
operating_model: https://github.com/hallovorld/RenQuant/blob/main/doc/arch/subrepo-operating-model.md
repo_map: RENQUANT_REPOS.md
pipeline_required: true
branch_policy:
  main: stable interface for downstream repos and automation
  feature_branches: experiments, optimizations, and large upgrades
source_repo:
  name: RenQuant
  never_delete: true
dependencies:
  - renquant-common
  - renquant-strategy-104
  - renquant-base-data
  - renquant-artifacts
inputs:
  - strategy config bundle
  - data manifest
  - sequence training config
outputs:
  - shadow or candidate artifact manifest
  - declared-label IC report
  - raw expected-return IC report
owns:
  - PatchTST/PatchTXT train/eval pipeline
  - sequence-model diagnostics
  - shadow-promotion evidence
forbidden:
  - production broker execution
  - prod decision-tree ownership
  - GBDT training internals
  - raw data or unchecked checkpoint dumps in Git
automation:
  test: make test
  doctor: make doctor
